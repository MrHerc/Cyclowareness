name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt "psycopg[binary]"
      - name: Run tests
        run: python -m pytest -q

      # The demo build and the production build are different API surfaces.
      # The suite runs as APP_ENV=demo, so assert the production gating here.
      - name: Production build refuses demo-grade config
        run: |
          if APP_ENV=production SECRET_KEY=short DATABASE_URL=sqlite:///./x.db \
             python -c "import app.main" 2>/dev/null; then
            echo "::error::production booted with demo-grade config"; exit 1
          fi
          echo "refused as expected"
      - name: Demo-only routes absent from production surface
        env:
          APP_ENV: production
          SECRET_KEY: ci-placeholder-key-at-least-32-bytes-long!!
          DATABASE_URL: postgresql+psycopg://u:p@localhost:5432/c
          CORS_ORIGINS: https://app.example.com
          # A valid production config now also requires the real sandbox
          # analyzer (the mock fabricates findings). Supplying it lets the app
          # boot so the route surface can be inspected.
          SANDBOX_ANALYZER: real
          REAL_ANALYZER_API_KEY: ci-placeholder-not-used-at-import
        run: |
          python - <<'PY'
          from app.main import app
          paths = set(app.openapi()["paths"])
          bad = [p for p in paths if "auto-outcomes" in p or "reset-demo" in p]
          assert not bad, f"demo-only routes exposed in production: {bad}"
          assert "/api/loop-runs" in paths, "core routes missing"
          print(f"production surface clean ({len(paths)} paths)")
          PY

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check & build
        run: npm run build
