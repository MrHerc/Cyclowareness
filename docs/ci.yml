# GitHub Actions CI for Cyclowareness.
#
# To enable: copy this file to `.github/workflows/ci.yml` and push with a
# token that has the `workflow` scope (a classic PAT without it — or a
# fine-grained token missing "Workflows: write" — will have the push rejected).
# It runs the backend pytest suite and the frontend type-check + build on every
# push to master/main and on pull requests.

name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  frontend:
    name: Frontend — typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check & build
        run: npm run build
